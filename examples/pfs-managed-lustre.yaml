---
blueprint_name: pfs-managed-lustre

vars:
  project_id:  ## Set GCP Project ID Here ##
  deployment_name: small-lustre
  region: us-central1
  zone: us-central1-a

# Documentation for each of the modules used below can be found at
# https://github.com/GoogleCloudPlatform/hpc-toolkit/blob/main/modules/README.md

deployment_groups:
- group: primary
  modules:
  - id: network1
    source: modules/network/pre-existing-vpc
    settings:
      network_name: ## Network Name ##
      subnetwork_name: ## Subnetwork Name ##

  - id: lustre-gcp
    source: modules/file-system/pre-existing-network-storage
    settings:
      server_ip: ## Enter instance information here, format: <IP>@tcp ##
      remote_mount: /lustrefs
      local_mount: /lustre
      fs_type: managed_lustre

  - source: modules/compute/vm-instance
    id: lustre_ubuntu22_instances
    use: [network1, lustre-gcp]
    settings:
      name_prefix: lustre-ubuntu22
      instance_count: 1
      machine_type: n2-standard-2
      instance_image:
        project: ubuntu-os-cloud
        name: ubuntu-2204-jammy-v20250128
